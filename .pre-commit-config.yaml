repos:
  # Ruff: linter + formatter (replaces flake8, isort, and black in one tool)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff             # lint: catches unused imports, style errors, etc.
        args: [--fix]        # auto-fix safe issues
      - id: ruff-format      # format: consistent code style
